<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset</title>
    <style>body { background: #000; margin: 0; }</style>
</head>
<body>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC33dWyXuymE8GG-Jgxq7KVFiolMYP7To4",
            authDomain: "questify-3c0d7.firebaseapp.com",
            databaseURL: "https://questify-3c0d7-default-rtdb.firebaseio.com",
            projectId: "questify-3c0d7",
            storageBucket: "questify-3c0d7.firebasestorage.app",
            appId: "1:376123638900:web:f1bc6238df32b499cf3d21"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        async function silentReset() {
            try {
                await set(ref(db), {
                    startTime: 0,
                    squares: {
                        "1": false,
                        "2": false,
                        "3": false,
                        "4": false,
                        "5": false
                    }
                });
                // Redirects to main page immediately after reset is successful
                window.location.href = "index.html";
            } catch (e) {
                console.error(e);
            }
        }

        silentReset();
    </script>
</body>
</html>

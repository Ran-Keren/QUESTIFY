<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questify - Dashboard</title>
    <style>
        body { 
            background: #000; 
            color: #00ff88; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Courier New', Courier, monospace; 
        }
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 450px; 
        }
        .grid { 
            display: flex; 
            justify-content: space-between;
            width: 100%; 
            gap: 12px; 
            margin-bottom: 25px; 
        }
        .square { 
            flex: 1; 
            aspect-ratio: 1 / 1; 
            border: 2px solid #444; 
            border-radius: 10px; 
            transition: all 0.5s ease; 
        }
        .square.active { 
            background: #00ff88; 
            border-color: #00ff88; 
            box-shadow: 0 0 20px #00ff88; 
        }
        #timer { 
            font-size: clamp(2.3rem, 16vw, 5rem); 
            font-weight: bold; 
            white-space: nowrap;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="grid">
            <!-- Squares mapped to Firebase keys: 1, 2, 3, 4, 5 -->
            <div class="square" id="sq1"></div>
            <div class="square" id="sq2"></div>
            <div class="square" id="sq3"></div>
            <div class="square" id="sq4"></div>
            <div class="square" id="sq5"></div>
        </div>
        <div id="timer">00:00:00</div>
    </div>

    <!-- This links to your logic file in the same public folder -->
    <script type="module" src="app.js"></script>
</body>
</html>

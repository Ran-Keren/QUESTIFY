<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questify</title>
    <style>
        body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; gap: 20px; font-family: sans-serif; }
        .square { width: 70px; height: 70px; border: 2px solid #222; border-radius: 15px; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        /* The Green State */
        .active { background: #00ff88; border-color: #00ff88; box-shadow: 0 0 25px rgba(0, 255, 136, 0.6); transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="square" id="sq1"></div>
    <div class="square" id="sq2"></div>
    <div class="square" id="sq3"></div>
    <div class="square" id="sq4"></div>
    <div class="square" id="sq5"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC33dWyXuymE8GG-Jgxq7KVFiolMYP7To4",
            authDomain: "questify-3c0d7.firebaseapp.com",
            databaseURL: "https://questify-3c0d7-default-rtdb.firebaseio.com",
            projectId: "questify-3c0d7",
            storageBucket: "questify-3c0d7.firebasestorage.app",
            messagingSenderId: "376123638900",
            appId: "1:376123638900:web:f1bc6238df32b499cf3d21"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'squares'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                for (let i = 1; i <= 5; i++) {
                    const el = document.getElementById(`sq${i}`);
                    data[i] === true ? el.classList.add('active') : el.classList.remove('active');
                }
            }
        });
    </script>
</body>
</html>

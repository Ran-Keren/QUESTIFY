<!DOCTYPE html>
<html>
<head>
    <title>Questify Status</title>
    <style>
        body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; gap: 15px; }
        .square { width: 60px; height: 60px; border: 2px solid #333; border-radius: 12px; transition: all 0.4s ease; }
        /* When the square is active (true in Firebase) */
        .active { background: #00ff88; border-color: #00ff88; box-shadow: 0 0 20px rgba(0, 255, 136, 0.5); }
    </style>
</head>
<body>

    <div class="square" id="sq1"></div>
    <div class="square" id="sq2"></div>
    <div class="square" id="sq3"></div>
    <div class="square" id="sq4"></div>
    <div class="square" id="sq5"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // PASTE YOUR FIREBASE CONFIG HERE FROM PROJECT SETTINGS
        const firebaseConfig = {
            apiKey: "...",
            authDomain: "...",
            databaseURL: "https://questify-3c0d7-default-rtdb.firebaseio.com",
            projectId: "...",
            storageBucket: "...",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Listen for data changes
        onValue(ref(db, 'squares'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                for (let i = 1; i <= 5; i++) {
                    const el = document.getElementById(`sq${i}`);
                    data[i] === true ? el.classList.add('active') : el.classList.remove('active');
                }
            }
        });
    </script>
</body>
</html>

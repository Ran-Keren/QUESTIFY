### Step 3: The Secret Trigger Page (`complete.html`)
This is the page your QR/NFC code will actually open. It updates the database and then immediately closes or shows a success message.
**Copy this and save it as `complete.html`:**
```html
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
  import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

  const firebaseConfig = { /* SAME CONFIG AS ABOVE */ };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const params = new URLSearchParams(window.location.search);
  const taskId = params.get('id'); // e.g., task1

  if(taskId) {
    set(ref(db, 'tasks/' + taskId), true).then(() => {
      document.body.innerHTML = "<h1>DONE!</h1>";
      // Optional: window.close(); 
    });
  }
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questify - Dashboard</title>
    <style>
        body { 
            background: #000; 
            color: #00ff88; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Courier New', Courier, monospace; 
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 450px; 
        }

        .grid { 
            display: flex; 
            justify-content: space-between;
            width: 100%; 
            gap: 12px; 
            margin-bottom: 25px; 
        }

        .square { 
            flex: 1; 
            aspect-ratio: 1 / 1; 
            border: 2px solid #444; 
            border-radius: 10px; 
            transition: all 0.5s ease; 
        }

        .square.active { 
            background: #00ff88; 
            border-color: #00ff88; 
            box-shadow: 0 0 20px #00ff88; 
        }

        #timer { 
            font-size: clamp(2.3rem, 16vw, 5rem); 
            font-weight: bold; 
            white-space: nowrap;
            line-height: 1;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="grid">
            <div class="square" id="sq1"></div>
            <div class="square" id="sq2"></div>
            <div class="square" id="sq3"></div>
            <div class="square" id="sq4"></div>
            <div class="square" id="sq5"></div>
        </div>

        <div id="timer">00:00:00</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC33dWyXuymE8GG-Jgxq7KVFiolMYP7To4",
            authDomain: "questify-3c0d7.firebaseapp.com",
            databaseURL: "https://questify-3c0d7-default-rtdb.firebaseio.com",
            projectId: "questify-3c0d7",
            storageBucket: "questify-3c0d7.firebasestorage.app",
            appId: "1:376123638900:web:f1bc6238df32b499cf3d21"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let startTime = 0;

        // The Map connecting your secret QR IDs to the visual squares
        const squareMap = {
            "x9j22": "sq1",
            "p5k88": "sq2",
            "m3q11": "sq3",
            "v7b44": "sq4",
            "r2n99": "sq5"
        };

        // Listen for Real-time Updates from Firebase
        onValue(ref(db), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // Sync startTime for the timer
            startTime = data.startTime || 0;

            // Sync Squares based on the secret keys
            for (const [secretKey, squareId] of Object.entries(squareMap)) {
                const el = document.getElementById(squareId);
                const isActive = data.squares && data.squares[secretKey] === true;
                
                if (isActive) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            }
        });

        // Timer Logic
        setInterval(() => {
            if (startTime === 0) {
                document.getElementById('timer').innerText = "00:00:00";
                return;
            }
            
            const diff = Date.now() - startTime;
            const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            
            document.getElementById('timer').innerText = `${h}:${m}:${s}`;
        }, 1000);
    </script>
</body>
</html>

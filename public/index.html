<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Viewport settings to strictly disable scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Questify - Dashboard</title>
    <style>
        body { 
            background: #000; 
            color: #00ff88; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Courier New', Courier, monospace;
            
            /* Disable scrolling and bounce */
            overflow: hidden;
            position: fixed;
            width: 100%;
            
            /* Disable all touch manipulations including double-tap to zoom */
            touch-action: none;
            
            /* Disable text selection and callouts */
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            user-select: none;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 450px; 
            /* Prevents browser handling of gestures */
            touch-action: none;
        }

        .grid { 
            display: flex; 
            justify-content: space-between;
            width: 100%; 
            gap: 12px; 
            margin-bottom: 25px; 
        }

        .square { 
            flex: 1; 
            aspect-ratio: 1 / 1; 
            border: 2px solid #444; 
            border-radius: 10px; 
            transition: all 0.5s ease; 
            /* Ensures squares don't trigger system menus on long press[cite: 4] */
            -webkit-user-drag: none;
        }

        .square.active { 
            background: #00ff88; 
            border-color: #00ff88; 
            box-shadow: 0 0 20px #00ff88; 
        }

        #timer { 
            font-size: clamp(2.3rem, 16vw, 5rem); 
            font-weight: bold; 
            white-space: nowrap;
            line-height: 1;
            /* Prevents selection of the numbers[cite: 4] */
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="grid">
            <div class="square" id="sq1"></div>
            <div class="square" id="sq2"></div>
            <div class="square" id="sq3"></div>
            <div class="square" id="sq4"></div>
            <div class="square" id="sq5"></div>
        </div>
        <div id="timer">00:00:00</div>
    </div>

    <!-- Live sync logic[cite: 3, 4] -->
    <script type="module" src="app.js"></script>
</body>
</html>

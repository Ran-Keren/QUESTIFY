<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Questify - Dashboard</title>
    <style>
        body { 
            background: #000; 
            color: #00ff88; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Courier New', Courier, monospace;
            
            /* Core locks */
            overflow: hidden;
            position: fixed;
            width: 100%;
            
            /* Disable native browser handling */
            touch-action: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            user-select: none;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 450px; 
            touch-action: none;
        }

        .grid { 
            display: flex; 
            justify-content: space-between;
            width: 100%; 
            gap: 12px; 
            margin-bottom: 25px; 
        }

        .square { 
            flex: 1; 
            aspect-ratio: 1 / 1; 
            border: 2px solid #444; 
            border-radius: 10px; 
            transition: all 0.5s ease; 
            -webkit-user-drag: none;
        }

        .square.active { 
            background: #00ff88; 
            border-color: #00ff88; 
            box-shadow: 0 0 20px #00ff88; 
        }

        #timer { 
            font-size: clamp(2.3rem, 16vw, 5rem); 
            font-weight: bold; 
            white-space: nowrap;
            line-height: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="grid">
            <div class="square" id="sq1"></div>
            <div class="square" id="sq2"></div>
            <div class="square" id="sq3"></div>
            <div class="square" id="sq4"></div>
            <div class="square" id="sq5"></div>
        </div>
        <div id="timer">00:00:00</div>
    </div>

    <script type="module" src="app.js?v=3"></script>

    <script>
        // HARD LOCK: Prevents double-tap to zoom by intercepting touchstart
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault(); // Blocks the second tap from triggering a zoom
            }
            lastTouchEnd = now;
        }, false);

        // EXTRA SECURITY: Disable pinch-to-zoom gestures
        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Updating...</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC33dWyXuymE8GG-Jgxq7KVFiolMYP7To4",
            authDomain: "questify-3c0d7.firebaseapp.com",
            databaseURL: "https://questify-3c0d7-default-rtdb.firebaseio.com",
            projectId: "questify-3c0d7",
            appId: "1:376123638900:web:f1bc6238df32b499cf3d21"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Get the ID from the URL (e.g., x9j22)
        const urlParams = new URLSearchParams(window.location.search);
        const squareId = urlParams.get('id');

        if (squareId) {
            const updates = {};
            updates[`/squares/${squareId}`] = true;
            
            // If it's the first square, start the timer
            if (squareId === "x9j22") {
                updates['/startTime'] = Date.now();
            }

            update(ref(db), updates).then(() => {
                document.body.innerHTML = "<h1>Square Activated!</h1>";
            });
        }
    </script>
</head>
<body style="background: black; color: #00ff88; font-family: monospace; text-align: center; padding-top: 50px;">
    <h1>Processing...</h1>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Questify Update</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC33dWyXuymE8GG-Jgxq7KVFiolMYP7To4",
            authDomain: "questify-3c0d7.firebaseapp.com",
            databaseURL: "https://questify-3c0d7-default-rtdb.firebaseio.com",
            projectId: "questify-3c0d7",
            appId: "1:376123638900:web:f1bc6238df32b499cf3d21"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const squareId = urlParams.get('id');

        async function processUpdate() {
            if (!squareId) return;

            const dbRef = ref(db);
            const snapshot = await get(dbRef);
            const data = snapshot.val() || {};
            
            const updates = {};
            // Updated path to ensure synchronization with the dashboard
            updates[`/squares/${squareId}`] = true;

            // If startTime is missing or 0, create it now
            if (!data.startTime || data.startTime === 0) {
                updates['/startTime'] = Date.now();
            }

            await update(dbRef, updates);
            
            // This replaces the entire screen with ONLY your text
            document.body.innerHTML = "<h1 style='font-size: 3rem;'>Achievement Unlocked</h1>";
            
            // Syncs the timer and squares on the web by redirecting
            setTimeout(() => { 
                window.location.href = "/"; 
            }, 1200);
        }

        processUpdate();
    </script>
</head>
<body style="background: black; color: #00ff88; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center;">
    <!-- Removed "Updating Questify" text from here -->
</body>
</html>

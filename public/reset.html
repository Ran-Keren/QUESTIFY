<!DOCTYPE html>
<html>
<head>
    <title>Questify System Reset</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC33dWyXuymE8GG-Jgxq7KVFiolMYP7To4",
            databaseURL: "https://questify-3c0d7-default-rtdb.firebaseio.com",
            projectId: "questify-3c0d7",
            appId: "1:376123638900:web:f1bc6238df32b499cf3d21"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        async function triggerReset() {
            try {
                // 1. Added 'stopTime' to the wipe list so it is completely erased
                const pathsToWipe = ['game', 'game_state', 'next_press', 'text_scramble_sync', 'stopTime'];

                for (const path of pathsToWipe) {
                    await remove(ref(db, path));
                }

                // 2. Reset the core system variables
                await set(ref(db, 'startTime'), 0);
                await set(ref(db, 'squares'), {
                    "x9j22": false, 
                    "p5k88": false, 
                    "m3q11": false, 
                    "v7b44": false, 
                    "r2n99": false
                });

                document.body.innerHTML = "<h1 style='color: #00ff88; font-family: monospace;'>System Reset Complete</h1>";
                setTimeout(() => { window.location.href = "/"; }, 1000);

            } catch (error) {
                console.error("Reset failed:", error);
                document.body.innerHTML = "<h1 style='color: #ff4d4d; font-family: monospace;'>Reset Failed: Check Console</h1>";
            }
        }

        triggerReset();
    </script>
</head>
<body style="background: black; display: flex; justify-content: center; align-items: center; height: 100vh;">
</body>
</html>

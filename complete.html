<!DOCTYPE html>
<html>
<head>
    <title>Task Completed</title>
    <style>
        body { background: #000; color: #00ff41; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
    </style>
</head>
<body>
    <h1 id="status">Processing...</h1>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        // IMPORTANT: Use the EXACT same config you used in index.html
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // This reads "?id=task1" from the URL
        const params = new URLSearchParams(window.location.search);
        const taskId = params.get('id');

        if (taskId) {
            set(ref(db, 'tasks/' + taskId), true)
                .then(() => {
                    document.getElementById('status').innerText = "TASK COMPLETED!";
                })
                .catch((error) => {
                    document.getElementById('status').innerText = "ERROR: " + error.message;
                });
        } else {
            document.getElementById('status').innerText = "NO TASK ID FOUND";
        }
    </script>
</body>
</html>

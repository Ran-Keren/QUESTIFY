<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Updating...</title>
    <style>
        body { background: #000; color: #00ff88; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: monospace; }
        #status { font-size: 1.5rem; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <div id="status">INITIALIZING...</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const statusEl = document.getElementById('status');

        if (id) {
            statusEl.innerText = "VERIFYING SCAN...";
            // We call the Netlify function with the secret ID
            fetch(`/.netlify/functions/unlock?id=${id}`)
                .then(res => res.json())
                .then(data => {
                    if (data.status === "SUCCESS") statusEl.innerText = "ACHIEVEMENT UNLOCKED";
                    if (data.status === "ALREADY_USED") {
                        statusEl.innerText = "ALREADY UNLOCKED";
                        statusEl.style.color = "#ff4444";
                    }
                })
                .catch(err => {
                    statusEl.innerText = "CONNECTION ERROR";
                    console.error(err);
                });
        } else {
            statusEl.innerText = "INVALID QR CODE";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questify - Unlock</title>
    <style>
        body { background: #000; color: #00ff88; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: monospace; }
        #status { font-size: 1.5rem; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="status">UNLOCKING...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC33dWyXuymE8GG-Jgxq7KVFiolMYP7To4",
            authDomain: "questify-3c0d7.firebaseapp.com",
            databaseURL: "https://questify-3c0d7-default-rtdb.firebaseio.com",
            projectId: "questify-3c0d7",
            storageBucket: "questify-3c0d7.firebasestorage.app",
            appId: "1:376123638900:web:f1bc6238df32b499cf3d21"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        if (id) {
            // Update Database directly (Allowed on Spark Plan)
            const sqRef = ref(db, `squares/${id}`);
            
            set(sqRef, true).then(() => {
                // Check if we need to start the timer
                const timeRef = ref(db, 'startTime');
                get(timeRef).then((snap) => {
                    if (!snap.val() || snap.val() === 0) {
                        set(timeRef, Date.now());
                    }
                    // Redirect to the main dashboard after success
                    window.location.href = "index.html";
                });
            }).catch(err => {
                document.getElementById('status').innerText = "ERROR: CHECK DATABASE RULES";
            });
        }
    </script>
</body>
</html>

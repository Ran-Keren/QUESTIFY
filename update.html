<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update</title>
    <style>
        body { 
            background: #000; 
            color: #00ff88; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: monospace; 
            font-weight: bold; 
        }

        #status { 
            font-size: 1.5rem; 
            margin-bottom: 40px;
            text-align: center;
        }

        .grid { 
            display: flex; 
            justify-content: center;
            width: 90%;
            max-width: 400px; 
            gap: 10px; 
        }

        .square { 
            flex: 1; 
            aspect-ratio: 1 / 1; 
            border: 2px solid #888; 
            border-radius: 8px; 
            transition: 0.5s; 
        }

        .active { 
            background: #00ff88; 
            border-color: #00ff88; 
            box-shadow: 0 0 15px #00ff88; 
        }

        .error-text { color: #ff4444; }
    </style>
</head>
<body>

    <div id="status"></div>

    <div class="grid">
        <div class="square" id="sq1"></div>
        <div class="square" id="sq2"></div>
        <div class="square" id="sq3"></div>
        <div class="square" id="sq4"></div>
        <div class="square" id="sq5"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC33dWyXuymE8GG-Jgxq7KVFiolMYP7To4",
            authDomain: "questify-3c0d7.firebaseapp.com",
            databaseURL: "https://questify-3c0d7-default-rtdb.firebaseio.com",
            projectId: "questify-3c0d7",
            storageBucket: "questify-3c0d7.firebasestorage.app",
            appId: "1:376123638900:web:f1bc6238df32b499cf3d21"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const statusEl = document.getElementById('status');

        if (id) {
            const sqRef = ref(db, 'squares/' + id);
            
            get(sqRef).then((snap) => {
                if (snap.val() === true) {
                    statusEl.innerText = "ALREADY USED";
                    statusEl.className = "error-text";
                } else {
                    set(sqRef, true).then(() => {
                        statusEl.innerText = "ACHIEVEMENT UNLOCKED";
                        
                        // Start timer if it's the very first scan ever
                        get(ref(db, 'startTime')).then((t) => {
                            if (!t.val() || t.val() === 0) set(ref(db, 'startTime'), Date.now());
                        });
                    });
                }
            });
        }

        // Always listen and update squares
        onValue(ref(db, 'squares'), (snap) => {
            const data = snap.val();
            if (data) {
                for (let i = 1; i <= 5; i++) {
                    const el = document.getElementById(`sq${i}`);
                    data[i] === true ? el.classList.add('active') : el.classList.remove('active');
                }
            }
        });
    </script>
</body>
</html>

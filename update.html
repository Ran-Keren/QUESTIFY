<!DOCTYPE html>
<html>
<body>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { /* PASTE SAME CONFIG HERE */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Get the square ID from the URL (e.g., update.html?id=1)
        const urlParams = new URLSearchParams(window.location.search);
        const squareId = urlParams.get('id');

        if (squareId) {
            set(ref(db, 'squares/' + squareId), true)
                .then(() => {
                    document.body.innerHTML = "<h1>Square " + squareId + " Updated!</h1>";
                    // Optional: redirect back to main page after 2 seconds
                    setTimeout(() => window.location.href = "index.html", 2000);
                });
        }
    </script>
</body>
</html>

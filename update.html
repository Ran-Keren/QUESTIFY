<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #00ff88; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; font-weight: bold; text-transform: uppercase; }
        .box { border: 3px solid #00ff88; padding: 30px; border-radius: 15px; font-size: 2rem; text-align: center; }
        .used { color: #ff4444; border-color: #ff4444; }
    </style>
</head>
<body>
    <div id="display" class="box" style="display:none;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC33dWyXuymE8GG-Jgxq7KVFiolMYP7To4",
            authDomain: "questify-3c0d7.firebaseapp.com",
            databaseURL: "https://questify-3c0d7-default-rtdb.firebaseio.com",
            projectId: "questify-3c0d7",
            storageBucket: "questify-3c0d7.firebasestorage.app",
            appId: "1:376123638900:web:f1bc6238df32b499cf3d21"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const display = document.getElementById('display');

        get(ref(db, 'startTime')).then((snapshot) => {
            const currentStart = snapshot.val();

            if (currentStart && currentStart > 0) {
                // ALREADY STARTED
                display.innerText = "ALREADY USED";
                display.classList.add('used');
            } else {
                // START FIRST TIME
                set(ref(db, 'startTime'), Date.now());
                display.innerText = "ACHIEVEMENT UNLOCKED";
            }
            display.style.display = 'block';
        });
    </script>
</body>
</html>
